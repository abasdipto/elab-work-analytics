name: Sync Sheets Data

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          MASTER_DB_ID: ${{ secrets.MASTER_DB_ID }}
          SALES_SHEET_ID: ${{ secrets.SALES_SHEET_ID }}
        run: node scripts/sync-sheets.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/master-data.json public/sales-data.json
          git diff --staged --quiet || git commit -m "data: auto-sync [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
